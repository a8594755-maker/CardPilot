[build]
  command = "echo NETLIFY_COMMIT_REF=$COMMIT_REF && echo NETLIFY_DEPLOY_ID=$DEPLOY_ID && VITE_NETLIFY_COMMIT_REF=$COMMIT_REF VITE_NETLIFY_DEPLOY_ID=$DEPLOY_ID npm run build -w @cardpilot/web"
  publish = "apps/web/dist"

[build.environment]
  NODE_VERSION = "20"

[context.production]
  branch = "main"

[context.deploy-preview]
  ignore = "true"

[context.branch-deploy]
  ignore = "true"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
