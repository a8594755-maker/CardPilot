[build]
  command = "npm install && cd apps/web && npx vite build"
  publish = "apps/web/dist"
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- apps/web/"

[build.environment]
  NODE_VERSION = "20"

[context.production]
  branch = "main"

[context.deploy-preview]
  ignore = "true"

[context.branch-deploy]
  ignore = "true"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
