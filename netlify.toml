[build]
  command = "npm run build -w @cardpilot/web"
  publish = "apps/web/dist"

[build.environment]
  NODE_VERSION = "20"

[context.production]
  branch = "main"

[context.deploy-preview]
  ignore = "true"

[context.branch-deploy]
  ignore = "true"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
